<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#fbf7ef" />
  <title>L'amore trova sempre un modo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main>
    <section class="hero" aria-label="Introduzione">
      <div class="hero-copy reveal">
        <p class="eyebrow">Un piccolo album</p>
        <h1>L'amore<br>trova sempre<br>un modo.</h1>
        <div class="line"></div>
      </div>

      <figure class="hero-photo reveal">
        <img src="massimo_edo_1.png" alt="" fetchpriority="high">
      </figure>
    </section>

    <section class="story" aria-label="Galleria fotografica">
      <figure class="photo wide reveal">
        <img src="massimo_edo_2.png" alt="" loading="lazy">
      </figure>

      <div class="pair">
        <figure class="photo reveal">
          <img src="massimo_edo_3.png" alt="" loading="lazy">
        </figure>
        <figure class="photo reveal delay">
          <img src="massimo_edo_4.png" alt="" loading="lazy">
        </figure>
      </div>

      <figure class="photo wide reveal">
        <img src="massimo_edo_5.png" alt="" loading="lazy">
      </figure>

      <div class="pair">
        <figure class="photo reveal">
          <img src="massimo_edo_6.png" alt="" loading="lazy">
        </figure>
        <figure class="photo reveal delay">
          <img src="massimo_edo_7.png" alt="" loading="lazy">
        </figure>
      </div>
    </section>

    <section class="video-section reveal" aria-label="Un piccolo momento">
      <p class="eyebrow">Un piccolo momento</p>
      <video controls playsinline preload="metadata" poster="massimo_edo_1.png">
        <source src="video.mp4" type="video/mp4">
        Il tuo browser non supporta il video.
      </video>
    </section>

    <footer class="reveal">Con affetto da Fra &amp; Alb</footer>
  </main>

  <div class="lightbox" hidden>
    <button class="close" aria-label="Chiudi">×</button>
    <button class="prev" aria-label="Foto precedente">‹</button>
    <img alt="">
    <button class="next" aria-label="Foto successiva">›</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
